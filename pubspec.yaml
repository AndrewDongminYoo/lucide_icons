name: lucide_icons_lite
description: >-
  Lightweight Lucide icons for Flutter — single-weight IconData, no RTL or
  multi-variant bloat. Icon set auto-synced with lucide-static.
version: 1.24.0
homepage: https://github.com/AndrewDongminYoo/lucide_icons
repository: https://github.com/AndrewDongminYoo/lucide_icons
issue_tracker: https://github.com/AndrewDongminYoo/lucide_icons/issues
topics:
  - icons
  - lucide
  - ui

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  import_sorter: ^4.6.0
  merry: ^2.1.1
  very_good_analysis: ^10.2.0

scripts:
  update-icons:
    (description): Upgrade lucide-static, copy font assets, and regenerate lib/lucide_icons_lite.dart.
    (scripts):
      - bash tool/update_icons.sh

flutter:
  fonts:
    - family: Lucide
      fonts:
        - asset: assets/lucide.ttf

import_sorter:
  emojis: true
