# Dependabot version updates.
# https://docs.github.com/code-security/reference/supply-chain-security/dependabot-options-reference
version: 2
updates:
  - package-ecosystem: npm # bumps package.json (the pnpm lockfile is not committed)
    directory: / # package.json lives at the repo root
    schedule:
      interval: daily
    # lucide-static is the only dependency that drives icon updates.
    allow:
      - dependency-name: lucide-static
        dependency-type: direct
    commit-message:
      prefix: chore
      include: scope # produces "chore(deps): ..."
    assignees:
      - AndrewDongminYoo
